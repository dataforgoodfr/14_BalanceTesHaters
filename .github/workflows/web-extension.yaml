name: Web Extension

on:
  pull_request:
  push:
    branches: [main]
    tags:
      # Tags named webext-v** will trigger Web extension release creation
      - webext-v**

jobs:
  extension-checks:
    name: Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - uses: actions/checkout@v2
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "browser-extension/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: "browser-extension/package.json"
          cache-dependency-path: "browser-extension/pnpm-lock.yaml"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Complie
        run: pnpm compile

      - name: Format
        run: pnpm format:check

      - name: Test
        run: pnpm test

  extension-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    outputs:
      tag-release-assets: ${{steps.create-tag-release.outputs.assets}}
    steps:
      - uses: actions/checkout@v2
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "browser-extension/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: "browser-extension/package.json"
          cache-dependency-path: "browser-extension/pnpm-lock.yaml"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install

      - name: Calculate Extension Version
        id: compute-version
        run: |
          SHA=${GITHUB_SHA::7}
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then            
            WEBEXT_VERSION_NAME="0.0.0-dev-pr${{ github.event.number }}-$SHA"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strips 'webext-v' prefix to result in 'x.y.z-sha'
            WEBEXT_TAG_VERSION=${GITHUB_REF_NAME#webext-v}
            WEBEXT_VERSION_NAME="$WEBEXT_TAG_VERSION-$SHA"
          else
            WEBEXT_VERSION_NAME="0.0.0-dev-latest-$SHA"
          fi
          echo "version-name=$WEBEXT_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag-version=$WEBEXT_TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Set version in package.json
        run: |
          echo "Using package version: ${{steps.compute-version.outputs.version-name}}" 
          jq --arg ver "${{steps.compute-version.outputs.version-name}}" '.version = $ver' package.json > tmp.json && mv tmp.json package.json

      - name: Build extension zip
        env:
          # Inject the VITE_BACKEND_API_TOKEN.
          VITE_BACKEND_API_TOKEN: ${{ secrets.VITE_BACKEND_API_TOKEN }}
        run: pnpm zip

      - name: "[PR] Upload build artifacts"
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        id: upload-bth-extension-artifact
        with:
          if-no-files-found: error
          name: bth-extension-chrome
          # needed because files are in a .output folder
          include-hidden-files: true
          path: |
            ${{ github.workspace }}/browser-extension/.output/chrome-mv3
          retention-days: 30

      - name: "[PR] Link artifacts in PR"
        if: github.event_name == 'pull_request' && steps.upload-bth-extension-artifact.outcome == 'success'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            📦 Web extension build artifacts: ${{ steps.upload-bth-extension-artifact.outputs.artifact-url }}
          comment-tag: extension-artifacts

      - name: "[main] Copy assets named bth-extension"
        if: github.ref == 'refs/heads/main'
        run: |
          cp .output/bth-extension-*-chrome.zip .output/bth-extension-latest-chrome.zip

      - name: "[main] Update assets on extension-latest release"
        uses: softprops/action-gh-release@v2.5.0
        if: github.ref == 'refs/heads/main'
        with:
          name: Web Extension Latest Development Build
          tag_name: extension-latest
          target_commitish: ${{github.sha}}
          prerelease: true
          fail_on_unmatched_files: true
          files: ${{github.workspace}}/browser-extension/.output/bth-extension-latest*.zip

      - name: "[tag] Create release"
        id: create-tag-release
        uses: softprops/action-gh-release@v2.5.0
        if: github.ref_type == 'tag'
        with:
          name: Web Extension ${{steps.compute-version.outputs.tag-version}}
          fail_on_unmatched_files: true
          files: ${{github.workspace}}/browser-extension/.output/bth-extension-*.zip

  publish:
    name: Publish Release To Store
    needs: [extension-checks, extension-artifacts]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: Chrome Web Store
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "browser-extension/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: "browser-extension/package.json"
          cache-dependency-path: "browser-extension/pnpm-lock.yaml"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: "Fetch artifacts from release and submit"
        env:
          ASSETS: ${{needs.extension-artifacts.outputs.tag-release-assets}}
        run: |
          # For some reason browser_download_url in ASSETS use "untagged" temporary ids
          # We need to refetch from url
          echo "ASSETS: $ASSETS"
          CHROME_ASSET_URL=$(echo "$ASSETS" | jq -r .[0].url)
          echo "CHROME_ASSET_URL: $CHROME_ASSET_URL"
          CHROME_ASSET_DOWNLOAD_URL=$(curl $CHROME_ASSET_URL | jq -r .browser_download_url)
          echo "CHROME_ASSET_DOWNLOAD_URL: $CHROME_ASSET_DOWNLOAD_URL"
          curl -o chrome-extension.zip $CHROME_ASSET_DOWNLOAD_URL
      - name: "Submit to Chrome Web Store"
        env:
          CHROME_EXTENSION_ID: "bjmmakmdjbdlhghmjobpcnmeefhfajfe"
          CHROME_PUBLISH_TARGET: "default"
          CHROME_SKIP_SUBMIT_REVIEW: false
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: pnpm wxt submit --chrome-zip chrome-extension.zip

  e2e-tests:
    name: E2E Tests
    defaults:
      run:
        working-directory: browser-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "browser-extension/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: "browser-extension/package.json"
          cache-dependency-path: "browser-extension/pnpm-lock.yaml"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Build extension
        run: pnpm build

      - name: Install xvfb
        run: sudo apt-get install xvfb

      - name: Run E2E tests
        working-directory: ./browser-extension
        env:
          PATH_TO_EXTENSION: ../.output/chrome-mv3
        run: xvfb-run pnpm playwright test --retries=3

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: browser-extension/playwright-report/
          retention-days: 5

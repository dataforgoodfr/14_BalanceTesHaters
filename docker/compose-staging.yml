services:
  db:
    image: postgres:latest
    ports:
      - 5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s
  api:
    build: 
      context: ..
      dockerfile: docker/backend/Dockerfile
    environment:
      - BTH_ENGINE_ECHO=${BTH_ENGINE_ECHO}
      - BTH_LOGGING_CONFIGURATION_FILE=${BTH_LOGGING_CONFIGURATION_FILE}
      - BTH_PG_DSN=${BTH_PG_DSN}
      - BTH_API_TOKEN=${BTH_API_TOKEN}
      - BTH_SLM_MODEL_PATH=${BTH_SLM_MODEL_PATH:-/models/qwen3-1.7b-q4_k_m.gguf}
      - BTH_SLM_N_THREADS=${BTH_SLM_N_THREADS:-4}
      - BTH_SLM_N_CTX=${BTH_SLM_N_CTX:-2048}
      - BTH_SLM_MAX_RAM_MB=${BTH_SLM_MAX_RAM_MB:-2048}
      - BTH_SLM_MAX_BATCH_SIZE=${BTH_SLM_MAX_BATCH_SIZE:-16}
      - BTH_SLM_BATCH_TIMEOUT_S=${BTH_SLM_BATCH_TIMEOUT_S:-0.5}
    ports:
      - "${BTH_API_PORT:-8001}:8000"
    volumes:
      - ./models:/models:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${BTH_CPU_LIMIT:-4.0}"
          memory: "${BTH_MEMORY_LIMIT:-3G}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.balanceteshaters-app.rule=Host(`balanceteshaters-app.services.d4g.fr`)
      - traefik.http.routers.balanceteshaters-app.entryPoints=webtls
      - traefik.http.routers.balanceteshaters-app.tls=true
      - traefik.docker.network=d4g-internal
      - traefik.http.services.balanceteshaters-app.loadbalancer.server.port=8000
